<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>상담 요약</title>
</head>
<body style="font-family: 'Malgun Gothic', sans-serif; color:#222; max-width:640px; margin:0 auto; padding:20px;">

<h2 style="color:#1864ab; border-bottom:2px solid #1864ab; padding-bottom:8px;">
    상담 요약 안내
</h2>

<p><span th:text="${clientName}"></span> 님, 안녕하세요.</p>
<p>아래와 같이 상담 내용을 정리하여 안내드립니다.</p>

<h3 style="color:#333; margin-top:24px;">📌 사건 정보</h3>
<ul>
    <li>사건명: <strong th:text="${caseName}"></strong></li>
    <li>사고유형: <span th:text="${accidentType}"></span></li>
    <li>상담일시: <span th:text="${consultDatetime}"></span></li>
</ul>

<h3 style="color:#333; margin-top:24px;">📝 상담 요약</h3>
<p style="background:#f8f9fa; padding:12px; border-left:3px solid #1864ab; white-space:pre-wrap;"
   th:text="${summaryContent}"></p>

<h3 style="color:#333; margin-top:24px;">📎 필요 서류</h3>
<ul>
    <li th:each="d : ${requiredDocs}" th:text="${d}"></li>
</ul>

<h3 style="color:#333; margin-top:24px;">➡️ 다음 단계</h3>
<ol>
    <li th:each="s : ${nextSteps}" th:text="${s}"></li>
</ol>

<hr style="margin-top:30px; border:none; border-top:1px solid #ddd;"/>
<p style="color:#888; font-size:0.85em;">
    본 메일은 손해사정 업무 지원을 위해 발송된 안내 메일입니다.<br/>
    문의 사항은 담당 손해사정사에게 회신 부탁드립니다.
</p>

</body>
</html>
