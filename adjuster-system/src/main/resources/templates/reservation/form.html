<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>새 예약 등록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/dashboard}">⚖️ 손해사정 시스템</a></div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">대시보드</a>
        <a th:href="@{/cases}">사건 목록</a>
        <a th:href="@{/reservations}" class="active">예약</a>
        <a th:href="@{/qna}">Q&amp;A</a>
        <a th:href="@{/mail/log}">메일 이력</a>
    </div>
    <div class="nav-user">
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container">
    <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

    <div class="page-header">
        <h2>새 예약 등록</h2>
        <a th:href="@{/reservations}" class="btn btn-secondary">← 목록</a>
    </div>

    <div class="card">
        <form th:action="@{/reservations}" method="post" th:object="${form}">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">고객명 <span class="required">*</span></label>
                    <input type="text" th:field="*{clientName}" class="form-control"
                           maxlength="100" placeholder="홍길동"/>
                    <div class="form-error" th:if="${#fields.hasErrors('clientName')}"
                         th:errors="*{clientName}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">사고유형</label>
                    <select th:field="*{accidentType}" class="form-control">
                        <option value="">선택하세요</option>
                        <option th:each="t : ${accidentTypes}"
                                th:value="${t.name()}"
                                th:text="${t.displayName}"></option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">연락처</label>
                    <input type="text" th:field="*{clientPhone}" class="form-control"
                           placeholder="010-1234-5678"/>
                </div>
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" th:field="*{clientEmail}" class="form-control"
                           placeholder="example@mail.com"/>
                    <div class="form-error" th:if="${#fields.hasErrors('clientEmail')}"
                         th:errors="*{clientEmail}"></div>
                </div>
            </div>
            <p style="color:#777; font-size:0.85em; margin-top:-8px;">
                * 연락처 또는 이메일 중 최소 하나는 입력해야 합니다.
            </p>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">예약 일시 <span class="required">*</span></label>
                    <input type="datetime-local" th:field="*{startAt}" class="form-control"/>
                    <div class="form-error" th:if="${#fields.hasErrors('startAt')}"
                         th:errors="*{startAt}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">상담 시간 (분)</label>
                    <input type="number" th:field="*{durationMin}" class="form-control"
                           min="10" max="240"/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">메모</label>
                <textarea th:field="*{memo}" class="form-control" rows="3"
                          placeholder="상담 요청 사유, 참고사항 등"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">저장</button>
                <a th:href="@{/reservations}" class="btn btn-secondary btn-lg">취소</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
