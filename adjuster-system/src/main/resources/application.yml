spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/adjuster_db?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML

server:
  port: 8080

ai:
  mode: local  # local (무료) 또는 openai (유료)
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    max-tokens: 300
    base-url: https://api.openai.com/v1

feature:
  mail:
    sender: mock            # mock | smtp (phase 2)
    default-from-name: "손해사정 시스템"
    default-from-address: "noreply@adjuster.local"
  help:
    engine: static          # static | llm (phase 2)
    debounce-ms: 2000

logging:
  level:
    com.adjuster: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
